spring.application.name=ratingservice
server.port=8082

# Enable actual service interactions (disable mocks)
sportlink.mock.dependencies=false

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sportlink_rating
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Dependent service URLs
sportlink.services.account-management.url=http://account-service:8081
sportlink.services.activity-management.url=http://activity-service:8083

# kafka configuration
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.bootstrap-servers=kafka:29092
spring.kafka.consumer.group-id=rating-reputation-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=reputation-updated:com.sportlink.ratingservice.dto.ReputationUpdatedEvent
spring.kafka.producer.properties.spring.json.add.type.headers=false