server:
  port: 8090

spring:
  application:
    name: moderation-service

  datasource:
    url: jdbc:postgresql://localhost:5439/moderation_service_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

clients:
  account-management:
    base-url: ${ACCOUNT_MANAGEMENT_BASE_URL:http://localhost:8081}
  interaction:
    base-url: ${INTERACTION_BASE_URL:http://localhost:8084}
  activity-management:
    base-url: ${ACTIVITY_MANAGEMENT_BASE_URL:http://localhost:8083}

resilience4j:
  circuitbreaker:
    instances:
      accountManagement:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      accountManagement:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - com.sportlink.moderation.exception.AccountSyncException
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - java.io.IOException
  timelimiter:
    instances:
      accountManagement:
        timeoutDuration: 3s
        cancelRunningFuture: true

logging:
  level:
    com.sportlink.moderation: INFO
    io.github.resilience4j: INFO
