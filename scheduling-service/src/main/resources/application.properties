server.port=8089

spring.application.name=scheduling-service

# ====== Database ======
spring.datasource.url=jdbc:postgresql://localhost:5432/scheduling_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ====== Actuator ======
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ====== Swagger / OpenAPI ======
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# ====== Kafka (consumer) ======
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.bootstrap-servers=${spring.kafka.bootstrap-servers}
spring.kafka.consumer.group-id=scheduling-service
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=activityCancelledEvent:com.sportlink.scheduling.event.ActivityCancelledEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.enable-auto-commit=false