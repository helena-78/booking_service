spring.application.name=matchingservice
server.port=8087

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/sportlink_matching
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# External service URLs
# sportlink.services.account-management.url=http://localhost:8081
# sportlink.services.search.url=http://localhost:8084
# sportlink.services.scheduling.url=http://localhost:8085
sportlink.services.account-management.url=http://account-service:8081
sportlink.services.search.url=http://search-service:8086
sportlink.services.scheduling.url=http://scheduling-service:8089

# Mock flags, set to false when the real service is available
sportlink.mock.account-management=false
sportlink.mock.search=false
sportlink.mock.scheduling=false

# Scoring weights, sum to 1
sportlink.matching.weights.sport=0.35
sportlink.matching.weights.skill=0.25
sportlink.matching.weights.location=0.20
sportlink.matching.weights.rating=0.15
sportlink.matching.weights.language=0.05

# kafka configuration
# Use localhost for local startup; Docker Compose overrides with SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=matching-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.enable-auto-commit=false
# Type mappings for consumed events
spring.kafka.consumer.properties.spring.json.type.mapping=account.user.updated:com.sportlink.matchingservice.kafka.event.UserUpdatedEvent
spring.kafka.consumer.properties.spring.json.type.mapping=activity.created:com.sportlink.matchingservice.kafka.event.ActivityCreatedEvent
spring.kafka.consumer.properties.spring.json.type.mapping=activity.cancelled:com.sportlink.matchingservice.kafka.event.ActivityCancelledEvent
spring.kafka.consumer.properties.spring.json.type.mapping=rating.created:com.sportlink.matchingservice.kafka.event.RatingCreatedEvent
spring.kafka.consumer.properties.spring.json.type.mapping=rating.deleted:com.sportlink.matchingservice.kafka.event.RatingDeletedEvent
spring.kafka.consumer.properties.spring.json.type.mapping=reputation.updated:com.sportlink.matchingservice.kafka.event.UserReputationUpdatedEvent
