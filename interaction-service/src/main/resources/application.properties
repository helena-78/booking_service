spring.application.name=interaction-service
server.port=8084

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/interaction_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.preferIpAddress=true

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Do not fail if queues are missing (RabbitMQ may not be running during dev/test)
spring.rabbitmq.listener.simple.missing-queues-fatal=false

# Resilience4j — circuit breaker wrapping Account Management REST calls
resilience4j.circuitbreaker.instances.account-management.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.account-management.slidingWindowSize=5
resilience4j.circuitbreaker.instances.account-management.failureRateThreshold=50
resilience4j.circuitbreaker.instances.account-management.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.account-management.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.instances.account-management.automaticTransitionFromOpenToHalfOpenEnabled=true

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
