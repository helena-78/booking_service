spring.application.name=search-service

server.port=8086
# Database Settings
spring.datasource.url=jdbc:postgresql://localhost:5432/searchservice_db

spring.datasource.username= postgres
spring.datasource.password= postgres

# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
# Hibernate ddl auto (create, create-drop, validate, update)
# Allows for auto creation of tables
spring.jpa.hibernate.ddl-auto = update

# when using @Slf4j, you need to add the following to show the logs in the terminal
logging.level.com=INFO

# External services - synchronous dependencies of Search Service
# Booking Service provides facility data that this service indexes/keeps in sync with.
services.booking.url=http://localhost:8088

# Swagger / OpenAPI
springdoc.api-docs.path=/v1/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

#Kafka
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=search-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.sportlink.search.event.BookingEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false

sportlink.kafka.topics.booking-events=booking-events