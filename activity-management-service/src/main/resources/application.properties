server.port=8083

spring.application.name=activity-management-service

# ====== Dependent service URLs ======
sportlink.services.account-management.url=http://localhost:8081
sportlink.services.scheduling.url=http://localhost:8087

# ====== Database ======
spring.datasource.url=jdbc:postgresql://localhost:5432/activity_management_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false


# ====== Eureka ======
eureka.client.enabled=false
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.client.instance.preferIpAddress=true
eureka.instance.preferIpAddress=true

# ====== Actuator ======
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ====== Swagger / OpenAPI ======
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# ====== Mock-mode for dependent services ======
sportlink.mock.dependencies=false